<header class="topbar-header">
  <div class="topbar-left">
    <div class="welcome-section">
      <span class="welcome-text">Welcome back, <strong class="user-name">{{ authService.currentUser()?.fullName || 'User' }}</strong></span>
      <span class="current-date"><i class="fa-regular fa-calendar-days"></i> {{ currentDate }}</span>
    </div>
  </div>

  <div class="topbar-center">
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
      <input 
        type="text" 
        [(ngModel)]="searchQuery" 
        (keyup.enter)="onSearch()"
        placeholder="Search for transactions, bills, or help..."
      >
      <span class="search-kbd">⌘K</span>
    </div>
  </div>

  <div class="topbar-right">
    <div class="topbar-actions">
      <button class="action-btn" title="Notifications">
        <i class="fa-regular fa-bell"></i>
        <span class="notification-dot"></span>
      </button>
      
      <button class="action-btn" title="Settings" [routerLink]="['/profile']">
        <i class="fa-regular fa-gear"></i>
      </button>

      <div class="user-profile">
        <div class="avatar">
          {{ (authService.currentUser()?.fullName?.charAt(0) || 'U') }}
        </div>
        <div class="user-info">
          <span class="role">{{ authService.currentUser()?.role || 'User' }}</span>
        </div>
        <button class="logout-btn" (click)="logout()" title="Logout">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>
      </div>
    </div>
  </div>
</header>
