<header class="topbar-header">
  <div class="topbar-left">
    <div class="welcome-section">
      <span class="welcome-text">Welcome back, <strong class="user-name">{{ authService.currentUser()?.fullName || 'User' }}</strong></span>
      <span class="current-date"><span class="material-symbols-outlined" style="font-size: 14px; margin-right: 4px;">calendar_month</span> {{ currentDate }}</span>
    </div>
  </div>

  <div class="topbar-center">
    <div class="search-box">
      <span class="material-symbols-outlined search-icon">search</span>
      <input
        type="text"
        [(ngModel)]="searchQuery"
        (keyup.enter)="onSearch()"
        placeholder="Search for transactions, bills, or help..."
      >
      <span class="search-kbd">⌘K</span>
    </div>
  </div>

  <div class="topbar-right">
    <div class="topbar-actions">
      <!-- Dark / Light Mode Toggle -->
      <button class="action-btn theme-toggle" (click)="toggleTheme()"
              [title]="themeService.isDarkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
        @if (themeService.isDarkMode()) {
          <span class="material-symbols-outlined">light_mode</span>
        } @else {
          <span class="material-symbols-outlined">dark_mode</span>
        }
      </button>

      <button class="action-btn" title="Notifications">
        <span class="material-symbols-outlined">notifications</span>
        <span class="notification-dot"></span>
      </button>

      <button class="action-btn" title="Settings" [routerLink]="['/profile']">
        <span class="material-symbols-outlined">settings</span>
      </button>

      <div class="user-profile">
        <div class="avatar">
          {{ (authService.currentUser()?.fullName?.charAt(0) || 'U') }}
        </div>
        <div class="user-info">
          <span class="role">{{ authService.currentUser()?.role || 'User' }}</span>
        </div>
        <button class="logout-btn" (click)="logout()" title="Logout">
          <span class="material-symbols-outlined">logout</span>
        </button>
      </div>
    </div>
  </div>
</header>
