      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur8" x="-20%" y="-20%" width="140%" height="140%">
