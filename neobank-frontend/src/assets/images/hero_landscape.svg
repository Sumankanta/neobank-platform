<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Mountain landscape background">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f5d79"/>
      <stop offset="22%" stop-color="#2d7b8a"/>
      <stop offset="54%" stop-color="#6fb18f"/>
      <stop offset="100%" stop-color="#a9c85c"/>
    </linearGradient>
    <linearGradient id="hill1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86c38e"/>
      <stop offset="100%" stop-color="#3d7a49"/>
    </linearGradient>
    <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfe28d"/>
      <stop offset="100%" stop-color="#5fa054"/>
    </linearGradient>
    <linearGradient id="hill3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#98d06f"/>
